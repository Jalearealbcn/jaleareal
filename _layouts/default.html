<!DOCTYPE html>
<html lang="es">
<head>
     <!-- Start cookieyes banner -->
    <script id="cookieyes" type="text/javascript" src="https://cdn-cookieyes.com/client_data/7c018e8854f32d7bd55e8c5a7392f7a4/script.js"></script>
    <!-- End cookieyes banner -->
     
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page.description | default: site.description }}">

    <title>{{ page.title | default: site.title }} - JaleaReal.com</title>

    <!-- CSS principal (ruta absoluta recomendada en Jekyll) -->
    <link rel="stylesheet" href="/assets/css/style.css">

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

    <!-- Opcional: mejora rendimiento + compatibilidad -->
    <!-- <meta name="theme-color" content="#ffffff"> -->
    <!-- <link rel="apple-touch-icon" href="/apple-touch-icon.png"> -->

    <!-- SEO básico -->
<meta name="author" content="{{ site.author }}">
<meta name="robots" content="index, follow">

<!-- Open Graph (para compartir en redes sociales) -->
<meta property="og:type" content="website">
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:url" content="{{ page.url | prepend: site.url }}">
<meta property="og:site_name" content="{{ site.title }}">
{% if page.thumbnail %}
<meta property="og:image" content="{{ page.thumbnail | prepend: site.url }}">
{% endif %}

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title | default: site.title }}">
<meta name="twitter:description" content="{{ page.description | default: site.description }}">
{% if page.thumbnail %}
<meta name="twitter:image" content="{{ page.thumbnail | prepend: site.url }}">
{% endif %}

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-4ZBXSP2FYJ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-4ZBXSP2FYJ');
</script>

<!-- Codigo Adsense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-0471151683361712"
     crossorigin="anonymous"></script>

</head>
<body>
    {% include header.html %}
    
    <main>
        {{ content }}
    </main>
    
    {% include footer.html %}

    <!-- Opcional: scripts que necesites (al final del body) -->
    <!-- <script src="/assets/js/main.js" defer></script> -->
</body>
</html>
