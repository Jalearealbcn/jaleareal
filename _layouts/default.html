<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page.description | default: site.description }}">

    <title>{{ page.title | default: site.title }} - JaleaReal.com</title>

    <!-- CSS principal (ruta absoluta recomendada en Jekyll) -->
    <link rel="stylesheet" href="/assets/css/style.css">

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

    <!-- Opcional: mejora rendimiento + compatibilidad -->
    <!-- <meta name="theme-color" content="#ffffff"> -->
    <!-- <link rel="apple-touch-icon" href="/apple-touch-icon.png"> -->
</head>
<body>
    <div id="construccion-banner">
    🚧 Web en construcción - Algunos apartados pueden no estar disponibles
    <button onclick="document.getElementById('construccion-banner').style.display='none'">✕</button>
    </div>

    {% include header.html %}
    
    <main>
        {{ content }}
    </main>
    
    {% include footer.html %}

    <!-- Opcional: scripts que necesites (al final del body) -->
    <!-- <script src="/assets/js/main.js" defer></script> -->
</body>
</html>
